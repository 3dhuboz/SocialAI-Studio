[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  # Firebase Web API keys (AIzaSy*) are client-side public keys — not secrets.
  # Firebase security is enforced by Security Rules, not by hiding this key.
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
