name = "socialai-api"
main = "src/index.ts"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

# Worker observability — retain logs from scheduled() handlers + fetch handlers
# so we can debug cron failures after the fact via `wrangler tail` and the
# dashboard's Logs tab. Without this, console.* output is dropped after each
# invocation and the only forensic data we have is rows in cron_runs.
[observability]
enabled = true

[vars]
ENVIRONMENT = "production"
LEARNING_BRAIN_ENABLED = "true"
LEARNING_RELEASE_ENFORCEMENT = "false"
LEARNING_AUTOPILOT_ENABLED = "false"
ORGANIC_REACH_ENABLED = "true"
ORGANIC_REACH_APPLY_ENABLED = "false"
IMAGE_GEN_PROVIDER = "gpt-image-2"
# Public base URL for the REELS_R2 bucket (set via R2 → socialai-reels →
# Settings → Public Development URL → Allow Access). Required so the prewarm
# cron can persist a durable, publicly-fetchable URL on each reel post for
# FB/IG to download via file_url. Without this var, cacheVideoToR2() returns
# null and the worker falls back to fal.ai's 24h-expiry URL — which only works
# for reels scheduled within the next ~24h. Custom domain preferred long-term.
R2_REELS_PUBLIC_BASE = "https://pub-cff7bdfbd7204e129ae671d65d62b20e.r2.dev"

# ── Shopify embedded app ──────────────────────────────────────────────────
# SHOPIFY_APP_URL is where the embedded React app lives — CF Pages serves
# shopify-app/dist at this hostname. The Pages project is internally named
# `socialai-shopify` but the public origin is app.socialaistudio.au because
# Shopify Partners blocks any URL containing "shopify" in the hostname.
# Used by the Token Exchange handler / Managed Install flow to bounce
# merchants into the embedded admin UI after install. Must match
# `application_url` in shopify.app.toml exactly.
SHOPIFY_APP_URL = "https://app.socialaistudio.au"
# Comma-separated OAuth scopes requested at install. Phase 1: read-only
# product access. Keep this list minimal — App Store reviewers ask why
# each scope is needed.
SHOPIFY_APP_SCOPES = "read_products"
# Comma-separated shop domains that must use `test: true` on Billing API
# charges. Use for Partner dev stores whose plan reports as a real paid
# plan (e.g. "basic") but which have no payment method on file. See
# lib/shopify-billing.ts shouldForceTestMode.
SHOPIFY_FORCE_TEST_SHOPS = "socialai-dev-store.myshopify.com"
# Shopify Client ID — PUBLIC value (appears in OAuth URLs, embedded app's
# <meta name="shopify-api-key">, and partner-listed install link). Lives
# in [vars] not as a secret. Must match `client_id` in shopify.app.toml
# exactly. Rotate via Partners dashboard → API credentials.
SHOPIFY_API_KEY = "f191b1dcbd73ce52f9c4b0d27591545e"

# Secrets — set via: npx wrangler secret put KEY_NAME
# OPENROUTER_API_KEY      (OpenRouter API key for AI generation)
# CLERK_SECRET_KEY        (Clerk secret key for JWT verification — sk_live_... for production)
# STAGING_AUTH_ALLOWED_USER_IDS (staging-only comma-separated Clerk user IDs)
# HIGGSFIELD_API_KEY      (optional future image provider; do NOT paste a CLI/browser OAuth token)
# HIGGSFIELD_API_SECRET   (optional future image provider; only with stable server API)
# SHOPIFY_API_SECRET      (Shopify Client Secret — signs OAuth HMACs, webhook HMACs, session JWTs)
# MASTER_ENCRYPTION_KEY   (32-byte hex — AES-GCM key for at-rest token encryption)

# POSTPROXY_API_KEY       (Postproxy publishing API key)
# POSTPROXY_WEBHOOK_SECRET or POSTPROXY_WEBHOOK_QUERY_SECRET
# MONITOR_SECRET          (protects /api/post-schedule deploy monitor feed)
# SOCIALAI_STUDIO_API_KEY (shared ingest fallback for trusted server-to-server callers)
# MY_ASSISTANT_INGEST_API_KEY (preferred My Assistant ingest key)
#
# Optional My Assistant routing vars:
# MY_ASSISTANT_AGENT_ACCOUNT_ID = "user_..."
# MY_ASSISTANT_WORKSPACE_ID = "client_..."

[[d1_databases]]
binding = "DB"
database_name = "socialai-db"
database_id = "6295841e-e5f7-4355-b0e0-c5f22e58d99d"

# R2 bucket for AI-generated reel videos. fal.ai Kling URLs expire ~24h —
# the prewarm cron copies each generated mp4 here so the publish cron has a
# durable URL to feed FB/IG. Create the bucket with:
#   npx wrangler r2 bucket create socialai-reels
# Public access: enable via dashboard (R2 → socialai-reels → Settings →
# Public access → Allow access via r2.dev) so FB/IG can fetch via file_url.
# A custom domain (e.g. reels.socialaistudio.au) is preferred for production
# but pub-{hash}.r2.dev works for the first ship — set R2_REELS_PUBLIC_BASE
# in [vars] once the bucket exists and exposes its public URL.
[[r2_buckets]]
binding = "REELS_R2"
bucket_name = "socialai-reels"
preview_bucket_name = "socialai-reels"

# Reel Studio finishing: trim to MP4 with original audio and extract a cover.
# Media Transformations has no local simulator, so Wrangler dev uses remote.
[media]
binding = "MEDIA"
remote = true

# R2 object lifecycle: cached reel videos auto-delete 90 days after upload.
# Posts referencing them have long since published; the durable URL was only
# needed to bridge fal.ai's 24h URL expiry to the scheduled publish time.
# Set this in the dashboard (R2 → socialai-reels → Settings → Object Lifecycle)
# OR run: npx wrangler r2 bucket lifecycle add socialai-reels \
#   --prefix=reels/ --expire-days=90 --id=expire-old-reels
# Lifecycle rules belong in the bucket config, not wrangler.toml — this comment
# is a deploy-checklist breadcrumb so we don't pile up orphan mp4s.

# Poster Maker — PNG bytes for the gallery live here, keyed posters/<id>.png.
# Created 2026-05-13 alongside schema_v11 migration. ~5 MB cap per poster
# enforced in the upload route (routes/posters.ts POST handler).
[[r2_buckets]]
binding     = "POSTER_ASSETS"
bucket_name = "socialai-posters"

# ── Phase 2: Vectorize semantic classifier (opt-in) ──
# Uncomment these two blocks + run the commands below to enable the
# Vectorize layer in the business-archetype classifier. The code in
# workers/api/src/index.ts (classifyViaVectorize + the rebuild-index
# endpoint) automatically activates when both bindings are present.
#
# Setup commands (one-time):
#   npx wrangler vectorize create archetypes --dimensions=768 --metric=cosine
#   curl -X POST https://socialai-api.steve-700.workers.dev/api/admin/rebuild-archetype-index \
#        -H "Authorization: Bearer $YOUR_ADMIN_TOKEN"
#
# [ai]
# binding = "AI"
#
# [[vectorize]]
# binding = "ARCHETYPE_VEC"
# index_name = "archetypes"

# Cron triggers:
# */5 * * * *   — prewarm images + prewarm videos + publish missed posts.
#                  Latency-sensitive lane only.
# */15 * * * *  — health sweep (threshold-based alerts via lib/alerts.ts).
#                  Detects publish_failure_burst (5+ Missed in 30 min) and
#                  publish_zombie (stuck-Publishing > 30 min). Near-free
#                  when nothing's wrong — one COUNT(*) per check.
# 0 */6 * * *   — backlog critique + backlog regen + fal.ai credits check.
#                  "Catch up later" lane. Throttled from */5 → every 6h to
#                  cap worst-case FLUX Pro Kontext spend (was $9.60/hr at
#                  */5 cadence; now $0.80 × 4 ticks/day worst case).
# 0 3 * * *    — refresh Facebook tokens (daily 3am UTC)
# 0 4 * * *    — refresh client_facts from connected FB Pages (daily 4am UTC)
# 0 21 * * SUN  — Autonomous Weekly Review (Monday 7am AEST = Sun 21:00 UTC).
#                 CF cron parser rejects "0" for day-of-week — use "SUN".
[triggers]
crons = ["*/5 * * * *", "*/15 * * * *", "0 3 * * *", "0 4 * * *", "0 */6 * * *", "0 21 * * SUN"]

[dev]
port = 8787

[env.staging]
name = "socialai-api-staging"
vars = { ENVIRONMENT = "staging", STAGING_AUTH_AUTHORIZED_PARTIES = "https://socialaistudio.au", R2_REELS_PUBLIC_BASE = "https://pub-cff7bdfbd7204e129ae671d65d62b20e.r2.dev", LEARNING_BRAIN_ENABLED = "true", LEARNING_RELEASE_ENFORCEMENT = "false", LEARNING_AUTOPILOT_ENABLED = "false", ORGANIC_REACH_ENABLED = "true", ORGANIC_REACH_APPLY_ENABLED = "false", IMAGE_GEN_PROVIDER = "gpt-image-2", SHOPIFY_APP_URL = "https://app.socialaistudio.au", SHOPIFY_APP_SCOPES = "read_products", SHOPIFY_FORCE_TEST_SHOPS = "socialai-dev-store.myshopify.com", SHOPIFY_API_KEY = "f191b1dcbd73ce52f9c4b0d27591545e" }

# Staging D1 — created 2026-05-17 via `npx wrangler d1 create socialai-db-staging`.
# Schema bootstrapped via `wrangler d1 export socialai-db --remote` followed by
# `wrangler d1 import socialai-db-staging --remote --file=<export>` to copy the
# prod schema rather than re-applying the historical migration sequence (v12
# ALTERs `campaigns` whose CREATE only lives in v17, so apply-in-order fails).
[[env.staging.d1_databases]]
binding = "DB"
database_name = "socialai-db-staging"
database_id = "0ce38359-c7d6-4d6e-b278-7ca1a719dbb4"

[[env.staging.r2_buckets]]
binding = "REELS_R2"
bucket_name = "socialai-reels"

[env.staging.media]
binding = "MEDIA"
remote = true

# Staging runs only record-only health, consent-gated pilot, readiness, and
# calibration jobs. Production publishing, refresh, reconciliation, strategy,
# and weekly email work is excluded by the dispatcher.
[env.staging.triggers]
crons = ["*/15 * * * *", "0 21 * * SUN"]

[[env.staging.r2_buckets]]
binding = "POSTER_ASSETS"
bucket_name = "socialai-posters"
preview_bucket_name = "socialai-reels"
