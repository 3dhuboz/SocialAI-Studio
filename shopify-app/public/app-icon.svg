<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200" role="img" aria-label="SocialAI Studio">
  <title>SocialAI Studio</title>
  <defs>
    <!-- Subtle dark gradient background (gives the icon some depth at large sizes) -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1F2937"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <!-- Amber gradient on the speech bubble — vibrant, brand-aligned -->
    <linearGradient id="bubbleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <!-- Soft inner shadow on the bubble -->
    <filter id="bubbleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feFlood flood-color="#000000" flood-opacity="0.18"/>
      <feComposite in2="off" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded-square background. iOS-style mask, ~22% corner radius. -->
  <rect x="0" y="0" width="1200" height="1200" rx="270" ry="270" fill="url(#bgGrad)"/>

  <!-- Subtle ring inset for premium feel (1px stroke at this scale ≈ ~6px) -->
  <rect x="6" y="6" width="1188" height="1188" rx="264" ry="264" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="2"/>

  <!-- Speech bubble — rounded rectangle with a tail pointing bottom-left.
       Sized to fit within ~70% of canvas (leaves 15% margin all sides). -->
  <g filter="url(#bubbleShadow)">
    <path
      d="
        M 320 320
        h 560
        a 110 110 0 0 1 110 110
        v 320
        a 110 110 0 0 1 -110 110
        H 530
        L 360 950
        a 16 16 0 0 1 -25 -16
        L 380 860
        H 320
        a 110 110 0 0 1 -110 -110
        V 430
        a 110 110 0 0 1 110 -110
        Z
      "
      fill="url(#bubbleGrad)"
    />
  </g>

  <!-- AI sparkle 1 — top-right of bubble, large -->
  <g transform="translate(820 470)" fill="#FFFFFF" opacity="0.95">
    <path d="
      M 0 -90
      L 18 -18
      L 90 0
      L 18 18
      L 0 90
      L -18 18
      L -90 0
      L -18 -18
      Z
    "/>
  </g>

  <!-- AI sparkle 2 — small, top-left -->
  <g transform="translate(480 430)" fill="#FFFFFF" opacity="0.85">
    <path d="
      M 0 -38
      L 8 -8
      L 38 0
      L 8 8
      L 0 38
      L -8 8
      L -38 0
      L -8 -8
      Z
    "/>
  </g>

  <!-- AI sparkle 3 — tiny, mid-right -->
  <g transform="translate(720 640)" fill="#FFFFFF" opacity="0.75">
    <path d="
      M 0 -22
      L 5 -5
      L 22 0
      L 5 5
      L 0 22
      L -5 5
      L -22 0
      L -5 -5
      Z
    "/>
  </g>

  <!-- Three pulse dots inside the bubble — the universal "typing / generating" signal. -->
  <g fill="#0F172A">
    <circle cx="540" cy="640" r="32"/>
    <circle cx="640" cy="640" r="32"/>
    <circle cx="740" cy="640" r="32"/>
  </g>
</svg>
