<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover lets the page extend under iPhone notch / home
         indicator; CSS env(safe-area-inset-*) handles padding. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- ═══ Primary Meta ═══ -->
    <title>SocialAI Studio — AI-Powered Social Media, Done For You</title>
    <meta name="description" content="SocialAI Studio automatically generates, schedules and publishes Facebook and Instagram posts for your business using AI. Save hours every week — done for you by Penny Wise I.T." />
    <meta name="keywords" content="AI social media, social media automation, Facebook posts AI, Instagram AI, small business social media, AI content generator, automated posting, social media management Australia" />
    <meta name="author" content="Penny Wise I.T" />
    <meta name="robots" content="index, follow" />
    <!-- theme-color matches the manifest amber so the browser address bar
         and PWA splash screen tint together. -->
    <meta name="theme-color" content="#0a0a14" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f59e0b" media="(prefers-color-scheme: light)" />
    <link rel="canonical" href="https://pennywiseit.com.au" />

    <!-- ═══ PWA ═══ -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- iOS web-app behaviour — fullscreen standalone mode, dark status bar. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SocialAI" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Stops iOS Safari from auto-detecting "phone numbers" inside
         captions / dates and turning them into tap-to-call links. -->
    <meta name="format-detection" content="telephone=no" />

    <!-- ═══ Open Graph / Facebook ═══ -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SocialAI Studio" />
    <meta property="og:title" content="SocialAI Studio — AI-Powered Social Media, Done For You" />
    <meta property="og:description" content="Automatically generate, schedule and publish Facebook &amp; Instagram posts using AI. Built for Australian small businesses and agencies by Penny Wise I.T." />
    <meta property="og:image" content="/logo-brand.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="SocialAI Studio — AI Social Media Automation" />
    <meta property="og:url" content="https://pennywiseit.com.au" />
    <meta property="og:locale" content="en_AU" />

    <!-- ═══ Twitter Card ═══ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SocialAI Studio — AI-Powered Social Media, Done For You" />
    <meta name="twitter:description" content="Automatically generate, schedule and publish Facebook &amp; Instagram posts using AI. Built for Australian small businesses." />
    <meta name="twitter:image" content="/logo-brand.png" />
    <meta name="twitter:image:alt" content="SocialAI Studio" />

    <!-- ═══ Favicons ═══ -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/logo-brand.png" />
    <link rel="apple-touch-icon" href="/logo-brand.png" />
    <link rel="shortcut icon" href="/logo.svg" />

    <!-- ═══ Structured Data ═══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "SocialAI Studio",
      "description": "AI-powered social media automation for small businesses and agencies. Automatically generate, schedule and publish Facebook and Instagram posts.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "AggregateOffer",
        "lowPrice": "29",
        "highPrice": "149",
        "priceCurrency": "AUD",
        "offerCount": "4"
      },
      "creator": {
        "@type": "Organization",
        "name": "Penny Wise I.T",
        "url": "https://pennywiseit.com.au",
        "email": "support@pennywiseit.com.au"
      }
    }
    </script>

    <script async src="https://js.stripe.com/v3/pricing-table.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
